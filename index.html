<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0c0f" />
<title>Hooje Calendar · 후제 캘린더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="styles.css" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon.ico" sizes="32x32" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="후제" />
</head>
<body>

<div id="loginScreen" class="login" hidden>
  <div class="login-card">
    <div class="login-mark"><svg class="brand-ico" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="14" width="46" height="42" rx="8" stroke="currentColor" stroke-width="3.2"/><line x1="9" y1="25" x2="55" y2="25" stroke="currentColor" stroke-width="3.2"/><line x1="21" y1="8" x2="21" y2="18" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/><line x1="43" y1="8" x2="43" y2="18" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/><path fill-rule="evenodd" fill="currentColor" d="M19,41 a11,11 0 1,0 22,0 a11,11 0 1,0 -22,0 z M26,37.5 a10,10 0 1,0 20,0 a10,10 0 1,0 -20,0 z"/><path fill="currentColor" d="M41 32 L42.4 35.6 L46 37 L42.4 38.4 L41 42 L39.6 38.4 L36 37 L39.6 35.6 Z"/></svg></div>
    <div class="login-title">Hooje Calendar</div>
    <div class="login-sub">후제 캘린더</div>
    <input id="loginId" class="login-input" type="text" placeholder="아이디" autocomplete="username" autocapitalize="off" />
    <input id="loginPin" class="login-input" type="password" inputmode="numeric" placeholder="PIN" autocomplete="current-password" />
    <button id="loginBtn" class="login-btn">로그인</button>
    <div class="login-note">내 계정만 접근할 수 있어요.</div>
  </div>
</div>

<div class="shell">
  <aside class="rail">
    <div class="rail-brand"><svg class="brand-ico" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="14" width="46" height="42" rx="8" stroke="currentColor" stroke-width="3.2"/><line x1="9" y1="25" x2="55" y2="25" stroke="currentColor" stroke-width="3.2"/><line x1="21" y1="8" x2="21" y2="18" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/><line x1="43" y1="8" x2="43" y2="18" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/><path fill-rule="evenodd" fill="currentColor" d="M19,41 a11,11 0 1,0 22,0 a11,11 0 1,0 -22,0 z M26,37.5 a10,10 0 1,0 20,0 a10,10 0 1,0 -20,0 z"/><path fill="currentColor" d="M41 32 L42.4 35.6 L46 37 L42.4 38.4 L41 42 L39.6 38.4 L36 37 L39.6 35.6 Z"/></svg><b>Hooje</b><span>Calendar</span></div>
    <nav class="rail-nav" id="railNav">
      <button data-tab="home" class="active"><i class="ti ti-layout-dashboard"></i><span>홈</span></button>
      <button data-tab="expense"><i class="ti ti-wallet"></i><span>지출</span></button>
      <button data-tab="gold"><i class="ti ti-coins"></i><span>골드</span></button>
      <button data-tab="stats"><i class="ti ti-chart-bar"></i><span>통계</span></button>
      <button data-tab="settings"><i class="ti ti-settings"></i><span>설정</span></button>
      <button data-tab="happy" class="happy-nav"><i class="ti ti-flame"></i><span>해피</span></button>
    </nav>
    <button class="rail-add" id="railAdd" aria-label="일정 추가"><i class="ti ti-plus"></i></button>
    <button class="rail-secret" id="railSecret" aria-label="더보기"><i class="ti ti-dots"></i></button>
  </aside>

  <main class="main">
    <section id="tab-home" class="tab"></section>
    <section id="tab-expense" class="tab" hidden></section>
    <section id="tab-gold" class="tab" hidden></section>
    <section id="tab-stats" class="tab" hidden></section>
    <section id="tab-settings" class="tab" hidden></section>
    <section id="tab-happy" class="tab" hidden></section>
  </main>

  <nav class="tabbar" id="tabbar">
    <button data-tab="home" class="active"><i class="ti ti-layout-dashboard"></i><span>홈</span></button>
    <button data-tab="expense"><i class="ti ti-wallet"></i><span>지출</span></button>
    <button data-tab="gold"><i class="ti ti-coins"></i><span>골드</span></button>
    <button class="fab" id="fab" aria-label="일정 추가"><i class="ti ti-plus"></i></button>
    <button data-tab="stats"><i class="ti ti-chart-bar"></i><span>통계</span></button>
    <button data-tab="settings"><i class="ti ti-settings"></i><span>설정</span></button>
    <button data-tab="happy" class="happy-nav"><i class="ti ti-flame"></i><span>해피</span></button>
  </nav>
</div>

<div class="modal-root" id="modalRoot" hidden></div>
<div class="toast" id="toast" hidden></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
